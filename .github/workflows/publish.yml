name: Publish agent-telegram

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no publishing)'
        required: false
        default: false
        type: boolean

concurrency:
  group: publish-agent-telegram
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            os: macos-14
          - target: darwin-x64
            os: macos-15-intel
          - target: linux-x64
            os: ubuntu-latest
          - target: linux-arm64
            os: ubuntu-24.04-arm
          - target: win32-x64
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Ensure tdl prebuilds exist
        shell: bash
        run: |
          TDL_DIR="node_modules/tdl"
          if [ ! -f "$TDL_DIR/prebuilds/${{ matrix.target }}/tdl.node" ]; then
            echo "Prebuild missing, extracting from npm package..."
            npm pack tdl --pack-destination /tmp
            tar xzf /tmp/tdl-*.tgz -C /tmp
            cp -r /tmp/package/prebuilds "$TDL_DIR/"
            echo "Prebuilds restored"
          fi
          ls -la "$TDL_DIR/prebuilds/${{ matrix.target }}/"
      - name: Build
        run: bun run apps/cli/scripts/build.ts --release
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
      - name: Smoke test
        if: matrix.target != 'win32-x64'
        run: |
          chmod +x apps/cli/dist/agent-telegram-${{ matrix.target }}/bin/agent-telegram
          apps/cli/dist/agent-telegram-${{ matrix.target }}/bin/agent-telegram --version
          # Test daemon starts and health check responds
          apps/cli/dist/agent-telegram-${{ matrix.target }}/bin/agent-telegram --daemon &
          for i in $(seq 1 15); do
            if curl -s http://localhost:7312/health | grep -q '"ok":true'; then
              echo "Daemon health check passed"
              kill %1 2>/dev/null || true
              wait 2>/dev/null || true
              exit 0
            fi
            sleep 1
          done
          echo "Daemon health check failed after 15 seconds"
          kill %1 2>/dev/null || true
          exit 1
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
      - name: Smoke test (Windows)
        if: matrix.target == 'win32-x64'
        shell: bash
        run: |
          apps/cli/dist/agent-telegram-${{ matrix.target }}/bin/agent-telegram --version
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-telegram-${{ matrix.target }}
          path: |
            apps/cli/dist/agent-telegram-${{ matrix.target }}/
            apps/cli/dist/agent-telegram-${{ matrix.target }}.*
          retention-days: 7

  publish:
    name: Publish
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - run: bun install --frozen-lockfile

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: apps/cli/dist/
          merge-multiple: true

      - name: Get version
        id: version
        run: |
          if [[ "$GITHUB_REF_NAME" == v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION=$(cd apps/cli && node -p "require('./package.json').version")
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        run: |
          cd apps/cli
          bun run scripts/publish.ts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm (dry run)
        if: ${{ inputs.dry_run }}
        run: |
          cd apps/cli
          bun run scripts/publish.ts --dry-run

      - name: Create GitHub Release
        if: ${{ !inputs.dry_run }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          ARCHIVES=()
          for f in apps/cli/dist/*.zip apps/cli/dist/*.tar.gz; do
            [ -f "$f" ] && ARCHIVES+=("$f")
          done
          if gh release view "$TAG" &>/dev/null; then
            gh release upload "$TAG" "${ARCHIVES[@]}" --clobber
          else
            gh release create "$TAG" --title "$TAG" --generate-notes "${ARCHIVES[@]}"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew tap
        if: ${{ !inputs.dry_run }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/avemeva/homebrew-tap.git /tmp/homebrew-tap
          cp apps/cli/dist/agent-telegram.rb /tmp/homebrew-tap/Formula/agent-telegram.rb
          cd /tmp/homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/agent-telegram.rb
          git commit -m "Update agent-telegram to v${VERSION}"
          git push
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  verify:
    name: Verify (${{ matrix.method }} on ${{ matrix.os }})
    needs: publish
    if: ${{ !inputs.dry_run }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            method: curl
          - os: macos-15-intel
            method: curl
          - os: ubuntu-latest
            method: curl
          - os: ubuntu-24.04-arm
            method: curl
          - os: macos-14
            method: npm
          - os: macos-15-intel
            method: npm
          - os: ubuntu-latest
            method: npm
          - os: ubuntu-24.04-arm
            method: npm
          - os: windows-latest
            method: npm
          - os: macos-14
            method: bun
          - os: ubuntu-latest
            method: bun
          - os: macos-14
            method: brew
    runs-on: ${{ matrix.os }}
    steps:
      - name: Install via curl
        if: matrix.method == 'curl'
        run: |
          curl -fsSL https://raw.githubusercontent.com/avemeva/kurier/main/install | bash -s -- --no-modify-path

      - name: Install via npm
        if: matrix.method == 'npm'
        run: npm i -g @avemeva/agent-telegram

      - name: Setup Bun
        if: matrix.method == 'bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install via bun
        if: matrix.method == 'bun'
        run: bun i -g @avemeva/agent-telegram

      - name: Install via brew
        if: matrix.method == 'brew'
        run: |
          brew install avemeva/tap/agent-telegram

      - name: Verify
        run: |
          agent-telegram --version
          agent-telegram doctor

      - name: Verify daemon
        if: matrix.os != 'windows-latest'
        run: |
          agent-telegram --daemon &
          for i in $(seq 1 15); do
            if curl -s http://localhost:7312/health | grep -q '"ok":true'; then
              echo "Daemon health check passed"
              kill %1 2>/dev/null || true
              wait 2>/dev/null || true
              exit 0
            fi
            sleep 1
          done
          echo "Daemon health check failed after 15 seconds"
          kill %1 2>/dev/null || true
          exit 1
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
